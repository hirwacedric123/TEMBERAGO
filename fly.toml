# fly.toml — TemberaGo always-on deploy
# https://fly.io/docs/reference/configuration/

app = 'temberago-web'
primary_region = 'jnb'

[build]

[env]
  PORT = '8080'
  DATA_DIR = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[[mounts]]
  source = 'temberago_data'
  destination = '/data'
  initial_size = '1gb'
